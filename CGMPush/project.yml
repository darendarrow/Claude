name: CGM Push
options:
  bundleIdPrefix: com.darrow
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "E2TQ3J9XBJ"
targets:
  CGMPush:
    type: application
    platform: iOS
    sources:
      - CGMPush
    settings:
      base:
        INFOPLIST_FILE: CGMPush/Info.plist
        CODE_SIGN_ENTITLEMENTS: CGMPush/CGMPush.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.darrow.CGMPush
        PRODUCT_NAME: CGM Push
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: CGMPush/CGMPush.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    capabilities:
      - background-modes:
          modes:
            - fetch
