name: LibreLinkUpHealthKit
options:
  bundleIdPrefix: com.darrow
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  LibreLinkUpHealthKit:
    type: application
    platform: macOS
    sources:
      - LibreLinkUpHealthKit
    settings:
      base:
        INFOPLIST_FILE: LibreLinkUpHealthKit/Info.plist
        CODE_SIGN_ENTITLEMENTS: LibreLinkUpHealthKit/LibreLinkUpHealthKit.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.darrow.LibreLinkUpHealthKit
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: LibreLinkUpHealthKit/LibreLinkUpHealthKit.entitlements
